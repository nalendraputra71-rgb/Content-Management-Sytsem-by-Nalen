<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <title>Hubify Social</title>
    <script>
      window.addEventListener('error', (event) => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = '<div style="color:red;padding:20px;font-family:sans-serif;"><h3>Application Error</h3><pre>' + event.message + '\\n' + event.filename + ':' + event.lineno + '</pre></div>';
        }
      });
      window.addEventListener('unhandledrejection', (event) => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = '<div style="color:red;padding:20px;font-family:sans-serif;"><h3>Unhandled Promise Rejection</h3><pre>' + (event.reason && event.reason.message ? event.reason.message : event.reason) + '</pre></div>';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
